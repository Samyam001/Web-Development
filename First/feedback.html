<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
</head>

<body>

    <h2 align="center">Feedback Form</h2>

    <form>

        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" minlength="3" required>
        <br><br>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
        <br><br>

        <p><strong>Rating</strong></p>

        <input type="radio" id="very_satisfied" name="rating" value="Very Satisfied" required>
        <label for="very_satisfied">Very Satisfied</label><br>

        <input type="radio" id="satisfied" name="rating" value="Satisfied">
        <label for="satisfied">Satisfied</label><br>

        <input type="radio" id="neutral" name="rating" value="Neutral">
        <label for="neutral">Neutral</label><br>

        <input type="radio" id="unsatisfied" name="rating" value="Unsatisfied">
        <label for="unsatisfied">Unsatisfied</label>

        <br><br>

        <p><strong>Interests</strong></p>

        <input type="checkbox" id="web_dev" name="interests" value="Web Development">
        <label for="web_dev">Web Development</label><br>

        <input type="checkbox" id="mobile_dev" name="interests" value="Mobile Development">
        <label for="mobile_dev">Mobile Development</label><br>

        <input type="checkbox" id="ai_ml" name="interests" value="AI & Machine Learning">
        <label for="ai_ml">AI & Machine Learning</label>

        <br><br>

        <label for="country">Country:</label>
        <select id="country" name="country" required>
            <option value="">-- Select a Country --</option>
            <option value="Nepal">Nepal</option>
            <option value="Canada">Canada</option>
            <option value="United Kingdom">United Kingdom</option>
        </select>

        <br><br>

        <label for="feedback">Write your feedback here:</label><br>
        <textarea id="feedback" name="feedback" rows="5" cols="40" placeholder="Enter your feedback..." minlength="10"
            maxlength="500" required></textarea>

        <br><br>

        <input type="submit" value="Submit">

    </form>

    <br>
    <a href="index.html" style="font-family: 'Times New Roman', serif;
          font-size: 18px;
          color: #000000;
          text-decoration: none;">
        Home Page
    </a>
</body>

</html>
